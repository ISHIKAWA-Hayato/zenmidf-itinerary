<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zenmidf-itinerary MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>zenmidf-itinerary</h1>
      <p class="subtitle">MVP: 1d1p タブ切替 行程表 UI</p>
    </header>

    <section class="trip-meta">
      <div><strong>タイトル:</strong> <span id="trip-title">-</span></div>
      <div><strong>タイムゾーン:</strong> <span id="trip-timezone">-</span></div>
      <div><strong>開始日:</strong> <span id="trip-start-date">-</span></div>
      <div><strong>DayStart:</strong> <span id="trip-day-start">-</span></div>
    </section>

    <section class="tabs" id="day-tabs"></section>

    <section class="pdf-controls">
      <div class="pdf-controls__label">PDF出力（日選択）</div>
      <div id="pdf-day-list" class="pdf-day-list"></div>
      <button id="download-pdf" type="button">PDF出力</button>
    </section>

    <section class="table-section">
      <div class="table-actions">
        <button id="add-row" type="button">+ 行を追加</button>
        <button id="download-json" type="button">JSON保存</button>
        <button id="import-json-btn" type="button">JSON読込</button>
        <input id="import-json" type="file" accept="application/json" hidden />
      </div>
      <div class="table-wrap">
        <table id="itinerary-table">
          <thead>
            <tr>
              <th>Start</th>
              <th>End</th>
              <th>Type</th>
              <th>Title</th>
              <th>From</th>
              <th>To</th>
              <th>Location</th>
              <th>Kind</th>
              <th>Category</th>
              <th>Transport</th>
              <th>Cost</th>
              <th>Memo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>

    <footer class="app-footer">
      <p>データ: docs/sample_itinerary_v0.json を読み込み中</p>
    </footer>
  </div>

  <!-- PDF用に一時生成するDOM -->
  <div id="pdf-root" class="pdf-root" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
