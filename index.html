<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zenmidf-itinerary MVP</title>
  <link rel="stylesheet" href="style.css?v=20260416" />
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>
  <div class="app">
    <header class="app-header">
      <h1>zenmidf-itinerary</h1>
      <p class="subtitle">MVP: 1d1p タブ切替 行程表 UI</p>
      <p id="readonly-banner" class="readonly-banner" hidden>閲覧専用モードです（編集はできません）</p>
      <p id="save-status" class="save-status" role="status" aria-live="polite" aria-atomic="true">読込中...</p>
    </header>

    <section id="loading-skeleton" class="loading-skeleton" aria-hidden="true">
      <div class="skeleton-block"></div>
      <div class="skeleton-block"></div>
      <div class="skeleton-grid">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </section>

    <section class="trip-meta">
      <label class="trip-meta-field">
        <span>タイトル</span>
        <input id="trip-title" class="input" type="text" placeholder="必須" />
        <small id="trip-title-error" class="field-error"></small>
      </label>
      <label class="trip-meta-field">
        <span>タイムゾーン</span>
        <input id="trip-timezone" class="input" type="text" placeholder="必須" />
        <small id="trip-timezone-error" class="field-error"></small>
      </label>
      <label class="trip-meta-field">
        <span>開始日</span>
        <input id="trip-start-date" class="input" type="date" />
        <small id="trip-start-date-error" class="field-error"></small>
      </label>
      <label class="trip-meta-field">
        <span>DayStart</span>
        <input id="trip-day-start" class="input" type="time" />
        <small id="trip-day-start-error" class="field-error"></small>
      </label>
    </section>

    <section class="day-tabs-section">
      <div class="tabs" id="day-tabs"></div>
      <div class="day-actions">
        <button id="add-day" type="button">+ Dayを追加</button>
        <button id="remove-day" type="button">現在のDayを削除</button>
      </div>
    </section>

    <section class="pdf-controls">
      <div class="pdf-controls__label">PDF出力（日選択）</div>
      <div id="pdf-day-list" class="pdf-day-list"></div>
      <button id="download-pdf" type="button">PDF出力</button>
    </section>

    <section class="table-section">
      <div class="table-actions">
        <button id="add-row" type="button">+ 行を追加</button>
        <button id="download-json" type="button">JSON保存</button>
        <button id="import-json-btn" type="button">JSON読込</button>
        <button id="share-url" type="button">共有URLをコピー</button>
        <input id="import-json" type="file" accept="application/json" hidden />
      </div>
      <div class="table-wrap">
        <table id="itinerary-table">
          <caption id="itinerary-table-caption" class="sr-only">日ごとの行程編集テーブル</caption>
          <thead>
            <tr>
              <th scope="col">Start</th>
              <th scope="col">End</th>
              <th scope="col">Type</th>
              <th scope="col">Title</th>
              <th scope="col">From</th>
              <th scope="col">To</th>
              <th scope="col">Location</th>
              <th scope="col">Kind</th>
              <th scope="col">Category</th>
              <th scope="col">Transport</th>
              <th scope="col">Cost</th>
              <th scope="col">Memo</th>
              <th scope="col"></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>

    <footer class="app-footer">
      <p>データ: docs/sample_itinerary_v0.json を読み込み中</p>
    </footer>
  </div>

  <!-- PDF用に一時生成するDOM -->
  <div id="pdf-root" class="pdf-root" aria-hidden="true"></div>

  <!-- jsPDF + html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="app.js?v=20260416" defer></script>
</body>
</html>
